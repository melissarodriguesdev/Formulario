<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>site privado</title>
</head>
<body>
    
    <script type="text/javascript">
    var cor = window.prompt('digite o codigo: \nazul \nroxo \nrosa');
    switch (cor) {
        case "azul":
        document.write("codigo aceito!");
        break;
       

        case "roxo":
        document.write("error!")
        break;

        case "rosa":
        document.write("tente novamente")
        break;

        default:
        document.write("você foi bloqueado")
    }
    </script>


</body>
</html>
